name: Feature Request
 description: 提议一个新功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你想要什么功能
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 为什么需要这个功能，它解决了什么问题
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案
    validations:
      required: false
