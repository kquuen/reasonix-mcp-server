name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check
        run: |
          node --check src/server/index.mjs
          node --check src/worker/index.mjs
          node --check src/core/config.mjs
          node --check src/core/state.mjs
          node --check src/core/review.mjs
          node --check src/tools/registry.mjs
